services:
  - type: web
    name: icode
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: SUPABASE_URL
        sync: false # Set securely in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # Set securely in Render dashboard
      - key: LIVEBLOCKS_SECRET_KEY
        sync: false # Set securely in Render dashboard
